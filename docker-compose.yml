services:
  telegram-forwarder:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - session_data:/app/session
      - data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  session_data:
  data:
